  debug: false
  container: "docker"
build_info:
  config: "[anonymized]/config.vsh.yaml"
  runner: "nextflow"
  engine: "native"
  output: "viash-target/nextflow/test_wfs/empty_workflow"
  executable: "viash-target/nextflow/test_wfs/empty_workflow/main.nf"
