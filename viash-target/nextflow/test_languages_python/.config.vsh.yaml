name: "test_languages_python"
argument_groups:
- name: "First group"
  arguments:
  - type: "file"
    name: "input"
    description: "An input file with positional arguments.\nMore checks for multiline\
      \ descriptions.\nTesting some characters that should be escaped: ''' \"\"\"\
      \ \\n ` $ \\\n"
    info: null
    example:
    - "input.txt"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--real_number"
    description: "A real number with positional arguments."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--whole_number"
    description: "A whole number with a standard flag."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "long"
    name: "--long_number"
    description: "A long"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "-s"
    description: "A sentence or word with a short flag."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Second group"
  description: "Foo"
  arguments:
  - type: "boolean_true"
    name: "--truth"
    description: "A switch flag."
    info: null
    direction: "input"
  - type: "boolean_false"
    name: "--falsehood"
    description: "A switch flag which is false when specified."
    info: null
    direction: "input"
  - type: "boolean"
    name: "--reality"
    description: "A switch flag without predetermined state."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Arguments"
  arguments:
  - type: "file"
    name: "--output"
    alternatives:
    - "-o"
    description: "Write the parameters to a json file."
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--log"
    description: "An optional log file."
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--optional"
    description: "An optional string."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--optional_with_default"
    info: null
    default:
    - "The default value."
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--multiple"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "multiple_pos"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
resources:
- type: "python_script"
  path: "code.py"
  is_executable: true
- type: "file"
  path: "resource1.txt"
description: "Prints out the parameter values.\nChecking what happens with multiline\
  \ descriptions.\n"
test_resources:
- type: "bash_script"
  path: "test.sh"
  is_executable: true
- type: "file"
  path: "resource2.txt"
info:
  foo: "bar"
  custom_tag: "custom_value"
status: "enabled"
scope:
  image: "public"
  target: "public"
requirements:
  cpus: 2
  memory: "2GB"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
