name: "test_languages_r"
argument_groups:
- name: "First group"
  arguments:
  - type: "file"
    name: "input"
    description: "An input file with positional arguments.\nMore checks for multiline\
      \ descriptions.\nTesting some characters that should be escaped: ''' \"\"\"\
      \ \\n ` $ \\\n"
    info: null
    example:
    - "input.txt"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--real_number"
    description: "A real number with positional arguments."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--whole_number"
    description: "A whole number with a standard flag."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "long"
    name: "--long_number"
    description: "A long"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "-s"
    description: "A sentence or word with a short flag."
    info: null
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Second group"
  description: "Foo"
  arguments:
  - type: "boolean_true"
    name: "--truth"
    description: "A switch flag."
    info: null
    direction: "input"
  - type: "boolean_false"
    name: "--falsehood"
    description: "A switch flag which is false when specified."
    info: null
    direction: "input"
  - type: "boolean"
    name: "--reality"
    description: "A switch flag without predetermined state."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Arguments"
  arguments:
  - type: "file"
    name: "--output"
    alternatives:
    - "-o"
    description: "Write the parameters to a json file."
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--log"
    description: "An optional log file."
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--optional"
    description: "An optional string."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--optional_with_default"
    info: null
    default:
    - "The default value."
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--multiple"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "multiple_pos"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
resources:
- type: "r_script"
  text: |
    
    ## VIASH START
    par <- list(
      multiple = c("one", "two"),
      multiple_pos = c("a", "b", "c", "d", "e", "f"),
      output = character(0),
      log = character(0)
    )
    ## VIASH END
    
    write_fun <- function(file, ...) {
      str <- paste(paste0(..., sep = ""), collapse = "")
      if (length(file) > 0) {
        write(sub("\n$", "", str), file = file, append = TRUE)
      } else {
        cat(str)
      }
    }
    
    write_fun(par$log, "INFO:Parsed input arguments.\n")
    
    if (length(par$output) > 0) {
      write_fun(par$log, 'INFO:Writing output to file\n')
    } else {
      write_fun(par$log, 'INFO:Printing output to console\n')
    }
    
    str <- sapply(names(par), function(n) {
      if(typeof(par[[n]]) == "character" && length(par[[n]]) == 0) {
        paste0(n, ": |empty array|\n")
      } else if (is.logical(par[[n]])) {
        paste0(n, ": |", tolower(paste(par[[n]], collapse = ";")), "|\n")
      } else {
        paste0(n, ": |", paste(par[[n]], collapse = ";"), "|\n")
      }
    })
    write_fun(par$output, str)
    
    con <- file(par[["input"]], "r")
    str <- paste0("head of input: |", readLines(con, n = 1), "|\n")
    write_fun(par$output, str)
    
    con <- file(paste0(meta$resources_dir, "/resource1.txt"), "r")
    str <- paste0("head of resource1: |", readLines(con, n = 1), "|\n")
    write_fun(par$output, str)
    
    str <- sapply(names(meta), function(n) {
      if (is.null(meta[[n]])) {
        paste0("meta_", n, ": ||\n")
      } else {
        paste0("meta_", n, ": |", paste(meta[[n]], collapse = ";"), "|\n")
      }
    })
    write_fun(par$output, str)

  dest: "script.vsh.R"
  is_executable: true
- type: "file"
  path: "resource1.txt"
description: "Prints out the parameter values.\nChecking what happens with multiline\
  \ descriptions.\n"
test_resources:
- type: "bash_script"
  path: "test.sh"
  is_executable: true
- type: "file"
  path: "resource2.txt"
