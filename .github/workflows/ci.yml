name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests (Spock / Gradle) ──────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v5
      - name: Build & test
        run: ./gradlew test

  # ── Integration tests (Nextflow pipelines) ───────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        # use same version as in build.gradle
        with:
          version: '24.10.9'

      - name: Build & install plugin
        run: ./gradlew install

      - name: Run integration tests
        run: ./scripts/integration/run.sh --verbose
